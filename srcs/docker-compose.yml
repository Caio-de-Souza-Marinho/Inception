name: inception

services:
        mariadb:
                build: ./requirements/mariadb
                image: mariadb
                container_name: mariadb
                env_file:
                        - .env
                secrets:
                        - db_password
                        - db_root_password
                volumes:
                        - mariadb:/var/lib/mysql
                networks:
                        - inception
                restart: always

        wordpress:
                build: ./requirements/wordpress
                image: wordpress
                container_name: wordpress
                env_file:
                        - .env
                secrets:
                        - db_password
                        - wp_admin_password
                        - wp_user_password
                volumes:
                        - wordpress:/var/www/html
                networks:
                        - inception
                depends_on:
                        - mariadb
                        - redis
                restart: always

        nginx:
                build: ./requirements/nginx
                image: nginx
                container_name: nginx
                env_file:
                        - .env
                volumes:
                        - wordpress:/var/www/html
                ports:
                        - "443:443"
                networks:
                        - inception
                depends_on:
                        - wordpress
                restart: always
        redis:
                build: ./requirements/bonus/redis
                image: redis
                container_name: redis
                env_file:
                        - .env
                networks:
                        - inception
                restart: always

secrets:
        db_password:
                file: ../secrets/db_password.txt
        db_root_password:
                file: ../secrets/db_root_password.txt
        wp_admin_password:
                file: ../secrets/wp_admin_password.txt
        wp_user_password:
                file: ../secrets/wp_user_password.txt

volumes:
        mariadb:
                driver: local
                driver_opts:
                        type: none
                        o: bind
                        device: ${HOME}/data/mariadb
        wordpress:
                driver: local
                driver_opts:
                        type: none
                        o: bind
                        device: ${HOME}/data/wordpress

networks:
        inception:
                driver: bridge
                name: inception
