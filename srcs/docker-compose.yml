services:
        mariadb:
                build: ./requirements/mariadb
                image: mariadb
                container_name: mariadb
                env_file:
                        - .env
                secrets:
                        - db_password
                        - db_root_password
                volumes:
                        - mariadb:/var/lib/mysql
                networks:
                        - inception
                restart: always

secrets:
        db_password:
                file: ../secrets/db_password.txt
        db_root_password:
                file: ../secrets/db_root_password.txt

volumes:
        mariadb:
                driver: local
                driver_opts:
                        type: none
                        o: bind
                        device: ${HOME}/data/mariadb

networks:
        inception:
                driver: bridge
